<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAN BURGER — Panel Cocina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --or:#E8641A;--orl:#FF7A28;
  --dk:#080300;--dk2:#110700;--dk3:#1A0C00;--dkc:#160900;
  --cr:#FFF0E0;--mt:#9A7050;--bd:rgba(232,100,26,.18);
  --pen:#E8641A;--prep:#3498DB;--done:#27AE60;--rej:#E74C3C;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',-apple-system,sans-serif;background:var(--dk);color:var(--cr);min-height:100vh}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--dk)}
::-webkit-scrollbar-thumb{background:var(--or);border-radius:3px}

/* LIGHT */
body.light{--dk:#F0ECE6;--dk2:#E8E0D8;--dk3:#F5F0EA;--dkc:#FFFFFF;--cr:#1A0800;--mt:#7A5C3A;--bd:rgba(232,100,26,.22)}
body.light .topbar{background:#E8E0D8}
body.light .statsbar{background:#EDE6DC}
body.light .stat-cell{border-right-color:rgba(232,100,26,.15)}
body.light .order-card{background:#F5F0EA}
body.light .oc-head{background:#EDE6DC}
body.light .oc-progress-wrap{background:#EDE6DC}
body.light .oc-foot{background:#EDE6DC}
body.light .check-item.checked{background:rgba(39,174,96,.1)}
body.light .completed-toggle{background:#EDE6DC}
body.light .comp-item{background:#EDE6DC}
body.light .login-box{background:rgba(255,248,240,.97)}
body.light .login-input{background:rgba(0,0,0,.05);color:#1A0800}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,#1A0C00 0%,#000 70%)}
.login-box{background:rgba(22,9,0,.92);border:1px solid rgba(232,100,26,.3);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:400px}
.login-logo{width:110px;height:auto;border-radius:12px;display:block;margin:0 auto 1.5rem}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;text-align:center;margin-bottom:.3rem}
.login-title span{color:var(--or)}
.login-sub{text-align:center;font-size:.82rem;color:var(--mt);margin-bottom:2rem}
.login-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1rem 1.2rem;color:var(--cr);font-size:1rem;margin-bottom:1rem;display:block}
.login-input:focus{outline:none;border-color:rgba(232,100,26,.6)}
.login-btn{width:100%;background:var(--or);color:#fff;padding:1rem;border-radius:12px;font-weight:900;font-size:1rem;text-transform:uppercase}
.login-err{color:#FF6B6B;font-size:.82rem;text-align:center;padding:.6rem;background:rgba(231,76,60,.1);border-radius:8px;margin-top:.5rem;display:none}

/* DASHBOARD */
#dashboard{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--dk2);border-bottom:1px solid var(--bd);padding:.9rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.tb-logo{height:38px;border-radius:6px}
.tb-brand{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;line-height:1}
.tb-brand small{display:block;font-family:'Nunito',sans-serif;font-size:.65rem;letter-spacing:3px;color:var(--mt);font-weight:700}
.tb-spacer{flex:1}
.tb-clock{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--or);background:rgba(232,100,26,.08);padding:.3rem .9rem;border-radius:8px;border:1px solid var(--bd)}
.tb-date{font-size:.72rem;color:var(--mt);line-height:1.4;text-align:right}
.theme-btn{background:rgba(255,255,255,.1);border:1px solid var(--bd);color:var(--cr);border-radius:50px;width:38px;height:38px;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-logout{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--mt);padding:.55rem 1rem;border-radius:10px;font-size:.8rem;font-weight:700}
.tb-logout:hover{border-color:var(--rej);color:var(--rej)}

.new-alert{position:fixed;top:1rem;right:1rem;z-index:999;background:var(--or);color:#fff;padding:1rem 1.5rem;border-radius:14px;font-weight:800;font-size:1rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 8px 30px rgba(232,100,26,.5);transform:translateX(150%);transition:transform .4s;pointer-events:none}
.new-alert.show{transform:translateX(0)}
.new-alert-ic{font-size:1.5rem;animation:shake .5s ease-in-out infinite alternate}
@keyframes shake{0%{transform:rotate(-15deg)}100%{transform:rotate(15deg)}}

.statsbar{display:flex;background:var(--dkc);border-bottom:1px solid var(--bd)}
.stat-cell{flex:1;padding:1.2rem;text-align:center;border-right:1px solid var(--bd)}
.stat-cell:last-child{border-right:none}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1}
.stat-lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--mt);margin-top:.2rem}
.stat-cell.pending .stat-val{color:var(--pen)}
.stat-cell.inprog .stat-val{color:var(--prep)}
.stat-cell.done .stat-val{color:var(--done)}
.stat-cell.sales .stat-val{color:var(--or)}

.main-content{flex:1;padding:2rem}
.section-hdr{display:flex;align-items:center;gap:.8rem;margin-bottom:1.5rem}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px}
.section-badge{background:var(--or);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:900}
.refresh-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--done);animation:pulse 2s ease-in-out infinite;margin-right:.4rem}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.empty-state{text-align:center;padding:5rem 2rem;border:1px dashed rgba(255,255,255,.06);border-radius:20px}
.empty-ic{font-size:4rem;margin-bottom:1rem;opacity:.4}
.empty-txt{color:var(--mt)}

.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;margin-bottom:2rem}

.order-card{background:var(--dk3);border-radius:18px;overflow:hidden;border-left:5px solid var(--pen);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.order-card.inprog{border-left-color:var(--prep)}

.oc-head{background:var(--dkc);padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--bd)}
.oc-num{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--or);letter-spacing:2px;line-height:1}
.oc-timestamp{font-size:.72rem;color:var(--mt);margin-top:.2rem}
.oc-pay{font-size:.72rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:.25rem .8rem;border-radius:50px;margin-bottom:.3rem;display:inline-block}
.oc-pay.nequi{background:rgba(233,30,140,.15);color:#E91E8C;border:1px solid rgba(233,30,140,.2)}
.oc-pay.daviplata{background:rgba(229,43,32,.15);color:#FF6B6B;border:1px solid rgba(229,43,32,.2)}
.oc-pay.llave{background:rgba(255,195,0,.15);color:#FFC300;border:1px solid rgba(255,195,0,.2)}
.oc-pay.efectivo{background:rgba(39,174,96,.15);color:#27AE60;border:1px solid rgba(39,174,96,.2)}
.oc-total{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--or);letter-spacing:1px}

.oc-timer{background:rgba(232,100,26,.1);border-bottom:1px solid var(--bd);padding:.5rem 1.2rem;display:flex;justify-content:space-between;align-items:center}
.timer-label{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--mt)}
.timer-val{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px}
.timer-val.urgent{color:var(--rej);animation:timerPulse 1s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.4}}

.oc-progress-wrap{background:var(--dkc);padding:.7rem 1.2rem;border-bottom:1px solid var(--bd)}
.oc-progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.oc-progress-fill{height:100%;background:var(--or);border-radius:2px;transition:width .3s}
.oc-progress-txt{font-size:.7rem;color:var(--mt);margin-top:.4rem;text-align:right;font-weight:700}

.oc-body{padding:1.2rem}
.oc-section{margin-bottom:1.1rem}
.oc-sec-label{font-size:.65rem;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:var(--mt);margin-bottom:.6rem}

.check-item{display:flex;align-items:center;gap:.9rem;padding:.65rem .7rem;border-radius:10px;margin-bottom:.3rem;cursor:pointer;user-select:none;transition:background .2s}
.check-item:hover{background:rgba(255,255,255,.03)}
.check-item.checked{background:rgba(39,174,96,.06)}
.check-box{width:32px;height:32px;border-radius:8px;flex-shrink:0;border:2.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;transition:all .25s}
.check-item.checked .check-box{background:var(--done);border-color:var(--done);color:#fff}
.check-item-name{flex:1;font-size:.92rem;font-weight:700;transition:color .2s}
.check-item.checked .check-item-name{color:rgba(255,255,255,.4);text-decoration:line-through}
.check-item-qty{background:rgba(255,255,255,.07);color:var(--mt);padding:.2rem .6rem;border-radius:50px;font-size:.75rem;font-weight:800}

.oc-notes{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.8rem 1rem;font-size:.83rem;color:var(--mt);margin-bottom:1rem;display:flex;gap:.5rem}

.oc-foot{padding:1rem 1.2rem;background:var(--dkc);border-top:1px solid var(--bd);display:flex;gap:.7rem}
.btn-ready{flex:1;padding:.9rem;border-radius:12px;font-weight:900;font-size:.95rem;letter-spacing:1px;text-transform:uppercase;transition:all .3s}
.btn-ready:disabled{background:#1E1E1E;color:#444;cursor:not-allowed}
.btn-ready:not(:disabled){background:var(--done);color:#fff;box-shadow:0 6px 20px rgba(39,174,96,.35)}
.btn-ready:not(:disabled):hover{background:#2ECC71}
.btn-ticket{background:rgba(232,100,26,.1);border:1px solid rgba(232,100,26,.2);color:var(--or);padding:.9rem 1.1rem;border-radius:12px;font-weight:700;font-size:.82rem}
.btn-reject{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.15);color:var(--rej);padding:.9rem .9rem;border-radius:12px;font-weight:700;font-size:.82rem}

.completed-section{margin-top:2rem}
.completed-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--dkc);border:1px solid var(--bd);border-radius:14px;padding:1rem 1.5rem;cursor:pointer;width:100%;text-align:left;color:var(--cr)}
.completed-toggle:hover{border-color:rgba(232,100,26,.3)}
.ct-arrow{color:var(--mt);transition:transform .3s}
.ct-arrow.open{transform:rotate(180deg)}
.completed-list{display:none;margin-top:1rem}
.completed-list.open{display:block}
.comp-item{background:var(--dkc);border:1px solid rgba(39,174,96,.15);border-radius:12px;padding:.9rem 1.2rem;margin-bottom:.6rem;display:flex;align-items:center;gap:1rem}
.comp-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--done);letter-spacing:1px}
.comp-items{font-size:.8rem;color:var(--mt);flex:1}
.comp-total{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--or)}
.comp-time{font-size:.72rem;color:var(--mt)}

@media(max-width:768px){
  .topbar{padding:.8rem 1rem;flex-wrap:wrap;gap:.8rem}
  .statsbar{flex-wrap:wrap}
  .stat-cell{flex:1 1 50%;border-bottom:1px solid var(--bd)}
  .main-content{padding:1rem}
  .orders-grid{grid-template-columns:1fr}
  .oc-foot{flex-wrap:wrap}
  .btn-ready{flex:100%}
}
@media(max-width:480px){.login-box{margin:1rem;padding:2rem 1.5rem}}

/* COMPROBANTE */
.oc-comprobante{padding:.8rem 1.2rem;border-top:1px solid var(--bd)}
.comprobante-img{width:100%;max-height:200px;object-fit:contain;border-radius:10px;cursor:pointer;border:1px solid var(--bd);margin:.5rem 0;transition:transform .2s}
.comprobante-img:hover{transform:scale(1.02)}
.btn-pago-ok{width:100%;padding:.75rem;border-radius:10px;background:rgba(39,174,96,.15);border:1px solid rgba(39,174,96,.3);color:#27AE60;font-weight:900;font-size:.85rem;margin-top:.4rem;cursor:pointer;transition:all .3s}
.btn-pago-ok:hover{background:rgba(39,174,96,.25)}
.pago-verificado-badge{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.25);color:#27AE60;border-radius:8px;padding:.5rem .8rem;font-size:.8rem;font-weight:800;text-align:center;margin-top:.4rem}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:12px;object-fit:contain}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <img src="img/logo.jpg" alt="KAN BURGER" class="login-logo">
    <div class="login-title">KAN <span>COCINA</span></div>
    <div class="login-sub">Panel exclusivo del restaurante</div>
    <input class="login-input" type="password" id="passInput" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔓 Entrar al Panel</button>
    <div class="login-err" id="loginErr">❌ Contraseña incorrecta</div>
  </div>
</div>

<div id="dashboard">
  <div class="new-alert" id="newAlert">
    <span class="new-alert-ic">🔔</span>
    <span>¡Nuevo pedido llegó!</span>
  </div>

  <div class="topbar">
    <img src="img/logo.jpg" alt="KAN BURGER" class="tb-logo">
    <div class="tb-brand">KAN COCINA<small>Panel del Restaurante</small></div>
    <div class="tb-spacer"></div>
    <div style="text-align:right">
      <div class="tb-clock" id="tbClock">00:00:00</div>
      <div class="tb-date" id="tbDate"></div>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
    <button class="tb-logout" onclick="doLogout()">Salir</button>
  </div>

  <div class="statsbar">
    <div class="stat-cell pending"><div class="stat-val" id="statPending">0</div><div class="stat-lbl">🟠 Pendientes</div></div>
    <div class="stat-cell inprog"><div class="stat-val" id="statInprog">0</div><div class="stat-lbl">🔵 En preparación</div></div>
    <div class="stat-cell done"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">✅ Completadas hoy</div></div>
    <div class="stat-cell sales"><div class="stat-val" id="statSales">$0</div><div class="stat-lbl">💰 Ventas hoy</div></div>
  </div>

  <div class="main-content">
    <div class="section-hdr">
      <div class="section-title">Órdenes Activas</div>
      <div class="section-badge" id="activeBadge">0</div>
      <div style="flex:1"></div>
      <span style="font-size:.72rem;color:var(--mt)"><span class="refresh-dot"></span>Actualizando cada 3 seg</span>
    </div>
    <div class="orders-grid" id="ordersGrid"></div>
    <div class="completed-section">
      <button class="completed-toggle" onclick="toggleCompleted()">
        <div style="display:flex;align-items:center;gap:.8rem">
          <span>📋</span>
          <div>
            <div style="font-weight:800;font-size:.95rem">Órdenes Completadas Hoy</div>
            <div style="font-size:.8rem;color:var(--mt)" id="completedCount">0 órdenes</div>
          </div>
        </div>
        <span class="ct-arrow" id="ctArrow">▼</span>
      </button>
      <div class="completed-list" id="completedList"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://enjlbusizeospzadndwj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sUXpKKZgEDbE7r77VRjFpQ_z815AhOd';
const PASS = 'KAN2025';

let sb = null;
let ordersCache = [];
let primeraVez = true;
let completedOpen = false;
let audioCtx = null;

// ── AUTH ──────────────────────────────────────────────────────────────
function doLogin() {
  const val = document.getElementById('passInput').value.trim();
  if (val !== PASS) {
    const err = document.getElementById('loginErr');
    err.style.display = 'block';
    document.getElementById('passInput').value = '';
    setTimeout(() => err.style.display = 'none', 2500);
    return;
  }
  localStorage.setItem('kb_sesion', '1');
  mostrarDashboard();
}

function doLogout() {
  localStorage.removeItem('kb_sesion');
  location.reload();
}

function mostrarDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'flex';
  dash.style.flexDirection = 'column';
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  iniciarPanel();
}

// ── PANEL ─────────────────────────────────────────────────────────────
async function iniciarPanel() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  setInterval(actualizarReloj, 1000);
  actualizarReloj();

  setInterval(() => {
    ordersCache.filter(o => o.estado === 'pendiente' || o.estado === 'en_preparacion').forEach(o => {
      const el = document.getElementById('timer_' + o.id);
      if (el) {
        const ts = new Date(o.fecha_hora);
        const urgente = (Date.now() - ts.getTime()) > 15 * 60 * 1000;
        el.textContent = elapsed(ts);
        el.className = 'timer-val' + (urgente ? ' urgent' : '');
      }
    });
  }, 1000);

  await cargarOrdenes();
  primeraVez = false;
  renderizar();

  setInterval(async () => {
    await cargarOrdenes();
    renderizar();
  }, 3000);
}

function actualizarReloj() {
  const n = new Date();
  document.getElementById('tbClock').textContent =
    n.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('tbDate').textContent =
    n.toLocaleDateString('es-CO', { weekday: 'long', day: '2-digit', month: 'long' });
}

// ── DATOS ─────────────────────────────────────────────────────────────
async function cargarOrdenes() {
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  try {
    const { data, error } = await sb
      .from('ordenes')
      .select('*')
      .gte('fecha_hora', hoy.toISOString())
      .order('fecha_hora', { ascending: true });

    if (error || !data) return;

    const idsAnteriores = new Set(ordersCache.map(o => o.id));

    // Preservar estado local (checks y estado marcado localmente)
    data.forEach(o => {
      const local = ordersCache.find(c => c.id === o.id);
      if (local) {
        if (local._checks) {
          o._checks = local._checks;
          o.verificaciones = local._checks;
        }
        // Si localmente está listo/rechazado, mantenerlo
        if (local.estado === 'listo' || local.estado === 'rechazado') {
          o.estado = local.estado;
          if (local.listo_en) o.listo_en = local.listo_en;
          if (local.tiempo_preparacion) o.tiempo_preparacion = local.tiempo_preparacion;
        }
        if (local.estado === 'en_preparacion' && o.estado === 'pendiente') {
          o.estado = 'en_preparacion';
        }
      }
    });

    ordersCache = data;

    if (!primeraVez) {
      data
        .filter(o => !idsAnteriores.has(o.id) && o.estado === 'pendiente')
        .forEach(o => alertarNueva(o));
    }
  } catch (e) {
    // sin internet — mantiene cache
  }
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderizar() {
  const hoy = new Date().toDateString();
  const pending = ordersCache.filter(o => o.estado === 'pendiente');
  const inprog  = ordersCache.filter(o => o.estado === 'en_preparacion');
  const active  = [...pending, ...inprog];
  const done    = ordersCache.filter(o => o.estado === 'listo' && new Date(o.fecha_hora).toDateString() === hoy);

  document.getElementById('statPending').textContent = pending.length;
  document.getElementById('statInprog').textContent  = inprog.length;
  document.getElementById('statDone').textContent    = done.length;
  document.getElementById('activeBadge').textContent = active.length;
  document.getElementById('statSales').textContent   = fmt(done.reduce((s, o) => s + (o.total || 0), 0));

  const grid = document.getElementById('ordersGrid');
  if (active.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-ic">✅</div><div class="empty-txt">Sin órdenes activas · Todo tranquilo</div></div>`;
  } else {
    grid.innerHTML = active.map(o => buildCard(o)).join('');
  }

  renderCompletadas(done);
}

// ── TARJETA ───────────────────────────────────────────────────────────
function buildCard(order) {
  const ts      = new Date(order.fecha_hora);
  const hora    = ts.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  const urgente = (Date.now() - ts.getTime()) > 15 * 60 * 1000;
  const payLbls = { nequi: 'Nequi 💜', daviplata: 'Daviplata ❤️', llave: 'Llave 🔑', efectivo: 'Efectivo 💵' };
  const payCls  = { nequi: 'nequi', daviplata: 'daviplata', llave: 'llave', efectivo: 'efectivo' };

  const comida  = order.comida  || [];
  const bebidas = order.bebidas || [];
  const salsas  = order.salsas  || [];
  const checks  = order._checks || order.verificaciones || {};

  const keys    = getKeys(order);
  const checked = keys.filter(k => checks[k]).length;
  const total   = keys.length;
  const pct     = total ? Math.round(checked / total * 100) : 0;
  const allDone = total > 0 && checked === total;
  const cls     = order.estado === 'en_preparacion' ? 'inprog' : '';

  const mkItem = (key, icon, name, qty) => {
    const isChecked = !!checks[key];
    return `<div class="check-item ${isChecked ? 'checked' : ''}" onclick="toggleCheck('${order.id}','${key}')">
      <div class="check-box">${isChecked ? '✓' : ''}</div>
      <span class="check-item-name">${icon} ${esc(name)}</span>
      ${qty ? `<span class="check-item-qty">${qty}</span>` : ''}
    </div>`;
  };

  const foodHTML  = comida.map((item, i)  => mkItem('f'  + i, '🍔', item.name, 'x' + item.qty)).join('');
  const drinkHTML = bebidas.map((d, i)    => mkItem('dk' + i, '🥤', d.name,    'x' + d.qty)).join('');
  const sauceHTML = salsas.map((s, i)     => mkItem('sa' + i, '🥫', s.name,    '')).join('');
  const packHTML  = mkItem('pack', '📦', 'Cubiertos · Servilletas · Todo empacado', '');

  return `<div class="order-card ${cls}" id="card_${order.id}">
    <div class="oc-head">
      <div>
        <div class="oc-num">#${order.id}</div>
        <div class="oc-timestamp">Recibido: ${hora}</div>
      </div>
      <div style="text-align:right">
        <div class="oc-pay ${payCls[order.metodo_pago] || ''}">${payLbls[order.metodo_pago] || order.metodo_pago || ''}</div>
        <div class="oc-total">${fmt(order.total)}</div>
      </div>
    </div>
    <div class="oc-timer">
      <span class="timer-label">⏱ Tiempo esperando</span>
      <span class="timer-val ${urgente ? 'urgent' : ''}" id="timer_${order.id}">${elapsed(ts)}</span>
    </div>
    <div class="oc-progress-wrap">
      <div class="oc-progress-bar"><div class="oc-progress-fill" style="width:${pct}%"></div></div>
      <div class="oc-progress-txt">${checked} de ${total} ítems confirmados</div>
    </div>
    <div class="oc-body">
      <div class="oc-section"><div class="oc-sec-label">🍔 Comida</div>${foodHTML}</div>
      ${bebidas.length ? `<div class="oc-section"><div class="oc-sec-label">🥤 Bebidas</div>${drinkHTML}</div>` : ''}
      ${salsas.length  ? `<div class="oc-section"><div class="oc-sec-label">🥫 Salsas</div>${sauceHTML}</div>`  : ''}
      <div class="oc-section"><div class="oc-sec-label">📦 Empaque</div>${packHTML}</div>
      ${order.notas ? `<div class="oc-notes"><span>📝</span><span>${esc(order.notas)}</span></div>` : ''}
    </div>
    ${order.comprobante_url ? `
    <div class="oc-comprobante">
      <div class="oc-sec-label">💳 COMPROBANTE DE PAGO</div>
      <img src="${order.comprobante_url}" class="comprobante-img" onclick="verComprobante('${order.comprobante_url}')" title="Click para ampliar">
      ${order.pago_verificado
        ? '<div class="pago-verificado-badge">✅ Pago verificado</div>'
        : `<button class="btn-pago-ok" onclick="verificarPago('${order.id}')">✅ Confirmar pago recibido</button>`
      }
    </div>` : ''}
    <div class="oc-foot">
      <button class="btn-ready" ${allDone ? '' : 'disabled'} onclick="marcarListo('${order.id}')">
        ${allDone ? '✅ Marcar como Lista' : `⏳ Faltan ${total - checked} ítems`}
      </button>
      <button class="btn-ticket" onclick="imprimirTicket('${order.id}')">🖨️</button>
      <button class="btn-reject" onclick="cancelarOrden('${order.id}')">✕</button>
    </div>
  </div>`;
}

function getKeys(order) {
  const k = [];
  (order.comida  || []).forEach((_, i) => k.push('f'  + i));
  (order.bebidas || []).forEach((_, i) => k.push('dk' + i));
  (order.salsas  || []).forEach((_, i) => k.push('sa' + i));
  k.push('pack');
  return k;
}

// ── ACCIONES ──────────────────────────────────────────────────────────
async function toggleCheck(orderId, key) {
  const order = ordersCache.find(o => o.id === orderId);
  if (!order || order.estado === 'listo') return;

  if (!order._checks) order._checks = { ...(order.verificaciones || {}) };
  order._checks[key] = !order._checks[key];
  order.verificaciones = { ...order._checks };

  const keys    = getKeys(order);
  const checked = keys.filter(k => order._checks[k]).length;
  if (checked > 0 && order.estado === 'pendiente') order.estado = 'en_preparacion';

  renderizar();

  try {
    await sb.from('ordenes').update({
      verificaciones: order.verificaciones,
      estado: order.estado
    }).eq('id', orderId);
  } catch(e) {}
}

async function marcarListo(orderId) {
  const order = ordersCache.find(o => o.id === orderId);
  if (!order) return;

  const keys = getKeys(order);
  const checks = order._checks || order.verificaciones || {};
  if (!keys.every(k => checks[k])) return;

  const ahora = new Date();
  order.estado = 'listo';
  order.listo_en = ahora.toISOString();
  order.tiempo_preparacion = Math.floor((ahora - new Date(order.fecha_hora)) / 1000);

  renderizar();

  try {
    await sb.from('ordenes').update({
      estado: 'listo',
      listo_en: order.listo_en,
      tiempo_preparacion: order.tiempo_preparacion
    }).eq('id', orderId);
  } catch(e) {}
}

async function cancelarOrden(orderId) {
  if (!confirm(`¿Cancelar el pedido #${orderId}?`)) return;
  const order = ordersCache.find(o => o.id === orderId);
  if (!order) return;
  order.estado = 'rechazado';
  renderizar();
  try {
    await sb.from('ordenes').update({ estado: 'rechazado' }).eq('id', orderId);
  } catch(e) {}
}

// ── COMPLETADAS ───────────────────────────────────────────────────────
function renderCompletadas(done) {
  document.getElementById('completedCount').textContent = `${done.length} orden${done.length !== 1 ? 'es' : ''}`;
  const list = document.getElementById('completedList');
  if (!done.length) {
    list.innerHTML = '<div style="color:var(--mt);font-size:.85rem;padding:.5rem">Aún no hay órdenes completadas hoy.</div>';
    return;
  }
  list.innerHTML = [...done].reverse().map(o => {
    const ts   = new Date(o.fecha_hora);
    const hora = ts.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    const items = [
      ...(o.comida  || []).map(i => `${i.qty}x ${i.name}`),
      ...(o.bebidas || []).map(d => `${d.qty}x ${d.name}`)
    ].join(' · ');
    return `<div class="comp-item">
      <span style="color:var(--done);font-size:1.2rem">✅</span>
      <div style="flex:1"><div class="comp-num">#${o.id}</div><div class="comp-items">${items}</div></div>
      <div style="text-align:right"><div class="comp-total">${fmt(o.total)}</div><div class="comp-time">${hora}</div></div>
    </div>`;
  }).join('');
}

function toggleCompleted() {
  completedOpen = !completedOpen;
  document.getElementById('ctArrow').classList.toggle('open', completedOpen);
  document.getElementById('completedList').classList.toggle('open', completedOpen);
}

// ── TICKET ────────────────────────────────────────────────────────────
function imprimirTicket(orderId) {
  const order = ordersCache.find(o => o.id === orderId);
  if (!order) return;
  const ts     = new Date(order.fecha_hora);
  const dt     = ts.toLocaleDateString('es-CO') + ' ' + ts.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  const payLbl = { nequi: 'Nequi', daviplata: 'Daviplata', llave: 'Llave', efectivo: 'Efectivo' };
  const foodR  = (order.comida  || []).map(i => `<tr><td>${i.qty}x ${i.name}</td><td style="text-align:right">${fmt(i.price * i.qty)}</td></tr>`).join('');
  const drinkR = (order.bebidas || []).map(d => `<tr><td>${d.qty}x ${d.name}</td><td style="text-align:right">${fmt(d.price * d.qty)}</td></tr>`).join('');
  const sauceL = (order.salsas  || []).map(s => s.name).join(', ');
  const w = window.open('', '_blank', 'width=360,height=640');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Ticket #${order.id}</title>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Courier New',monospace;font-size:12px;padding:16px;max-width:300px;margin:0 auto}.hdr{text-align:center;border-bottom:2px dashed #000;padding-bottom:10px;margin-bottom:10px}.logo{font-size:20px;font-weight:bold;letter-spacing:3px}.num{text-align:center;font-size:18px;font-weight:bold;margin:8px 0}table{width:100%}td{padding:3px 0}.tot td{font-weight:bold;font-size:15px;border-top:2px solid #000;padding-top:6px}.ft{text-align:center;font-size:10px;color:#555;margin-top:10px}</style>
  </head><body>
  <div class="hdr"><div class="logo">KAN BURGER</div><div style="font-size:10px;color:#555">100% Artesanal</div></div>
  <div class="num">Pedido #${order.id}</div>
  <div style="text-align:center;font-size:10px;color:#555;margin-bottom:8px">${dt}</div>
  <table>${foodR}${drinkR}${sauceL ? `<tr><td colspan="2" style="font-size:11px;border-top:1px dashed #000;padding-top:4px">Salsas: ${sauceL}</td></tr>` : ''}
  <tr class="tot"><td>TOTAL</td><td style="text-align:right">${fmt(order.total)}</td></tr></table>
  <div style="text-align:center;font-size:10px;margin-top:4px">Pago: ${payLbl[order.metodo_pago] || order.metodo_pago || ''}</div>
  ${order.notas ? `<div style="font-size:10px;border-top:1px dashed #000;margin-top:6px;padding-top:6px">📝 ${order.notas}</div>` : ''}
  <div class="ft">KAN BURGER · Hecho con ❤ en Venezuela</div>
  <script>setTimeout(()=>{window.print()},300)<\/script></body></html>`);
  w.document.close();
}

// ── NOTIFICACIONES Y SONIDO ───────────────────────────────────────────
function alertarNueva(order) {
  const a = document.getElementById('newAlert');
  a.classList.add('show');
  setTimeout(() => a.classList.remove('show'), 4000);
  playSound();
  if ('Notification' in window && Notification.permission === 'granted') {
    try {
      new Notification('🔔 KAN BURGER — Nuevo Pedido', {
        body: `Pedido #${order.id} · ${fmt(order.total)} · ${order.metodo_pago || ''}`,
        icon: 'img/logo.jpg',
        tag: 'orden-' + order.id,
        requireInteraction: true
      });
    } catch(e) {}
  }
}

function playSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100, 1320].forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.value = 0.25;
      const t = audioCtx.currentTime + i * 0.18;
      osc.start(t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.stop(t + 0.35);
    });
  } catch(e) {}
}

// ── UTILIDADES ────────────────────────────────────────────────────────
function fmt(n) { return '$' + (n || 0).toLocaleString('es-CO'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function verificarPago(orderId) {
  const order = ordersCache.find(o => o.id === orderId);
  if (!order) return;
  order.pago_verificado = true;
  renderizar();
  try { await sb.from('ordenes').update({ pago_verificado: true }).eq('id', orderId); } catch(e) {}
}

function verComprobante(url) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${url}">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}
function elapsed(from) {
  const d = Date.now() - new Date(from).getTime();
  const m = Math.floor(d / 60000);
  const s = Math.floor((d % 60000) / 1000);
  return m >= 60 ? Math.floor(m / 60) + 'h ' + (m % 60) + 'min' : m > 0 ? m + ' min ' + s + 's' : s + ' seg';
}

// ── TEMA ──────────────────────────────────────────────────────────────
function toggleTheme() {
  const light = document.body.classList.toggle('light');
  localStorage.setItem('kb_cocina_theme', light ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = light ? '🌙' : '☀️';
}
if (localStorage.getItem('kb_cocina_theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('themeBtn').textContent = '🌙';
}

// ── AUTO-LOGIN ────────────────────────────────────────────────────────
if (localStorage.getItem('kb_sesion') === '1') {
  mostrarDashboard();
} else {
  document.getElementById('passInput').focus();
}
</script>
